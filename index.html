<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Djiline — Modest Fashion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #0c0b0a;
  --paper: #f7f5f1;
  --warm-0: #f7f5f1;
  --warm-1: #edeae3;
  --warm-2: #d8d3c9;
  --warm-3: #b5afa3;
  --warm-4: #8a8277;
  --warm-5: #5a544c;
  --warm-6: #2e2b26;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Jost', system-ui, sans-serif;
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--sans);
  font-weight: 300;
  background: var(--paper);
  color: var(--ink);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── NAVIGATION ─── */
nav {
  position: fixed;
  inset: 0 0 auto 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 3.5rem;
  height: 64px;
  background: rgba(247,245,241,0.94);
  backdrop-filter: blur(12px);
  border-bottom: 0.5px solid var(--warm-2);
  transition: background 0.3s;
}

.logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--ink);
}

.logo sub {
  font-size: 8px;
  font-family: var(--sans);
  font-weight: 200;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--warm-4);
  vertical-align: baseline;
  margin-left: 2px;
}

.nav-center {
  display: flex;
  gap: 3rem;
  list-style: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.nav-center a {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-4);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-center a:hover { color: var(--ink); }

.nav-cta {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border: 0.5px solid var(--ink);
  transition: background 0.2s, color 0.2s;
}
.nav-cta:hover { background: var(--ink); color: var(--paper); }

/* ─── HERO ─── */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding-top: 64px;
}

.hero-visual {
  background: var(--warm-1);
  position: relative;
  overflow: hidden;
  min-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Replace this with: <img src="hero.jpg" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"> */
.hero-placeholder {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.hero-placeholder svg {
  opacity: 0.2;
  width: 160px;
}

.photo-hint {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--warm-3);
}

.hero-stripe {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--warm-2);
}

.hero-content {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 5vw 5vw 5vw 6vw;
}

.hero-tag {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--warm-4);
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.1s forwards;
}

.hero-h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(56px, 6vw, 90px);
  line-height: 0.92;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.25s forwards;
}

.hero-h1 em {
  font-style: italic;
  color: var(--warm-4);
  display: block;
}

.hero-body {
  font-size: 13px;
  line-height: 2;
  color: var(--warm-4);
  max-width: 300px;
  margin-bottom: 3.5rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.4s forwards;
}

.hero-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.55s forwards;
}

.btn-ink {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 14px 32px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: opacity 0.2s;
}
.btn-ink:hover { opacity: 0.7; }

.btn-ghost {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-4);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.2s;
}
.btn-ghost::after { content: '→'; transition: transform 0.2s; }
.btn-ghost:hover { color: var(--ink); }
.btn-ghost:hover::after { transform: translateX(4px); }

/* scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 3rem;
  left: 6vw;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--warm-3);
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
}

.scroll-line {
  width: 40px;
  height: 0.5px;
  background: var(--warm-3);
  animation: lineGrow 1s ease 1.1s both;
  transform-origin: left;
}

@keyframes lineGrow {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

/* ─── MANIFESTO ─── */
.manifesto {
  padding: 10vw 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.manifesto-inner {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 4rem;
  max-width: 1100px;
  padding: 0 5vw;
  width: 100%;
  align-items: start;
}

.manifesto-label {
  padding-top: 6px;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--warm-3);
}

.manifesto-label::before {
  content: '';
  display: block;
  width: 32px;
  height: 0.5px;
  background: var(--warm-3);
  margin-bottom: 12px;
}

.manifesto-quote {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(26px, 3vw, 44px);
  line-height: 1.25;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.manifesto-quote strong {
  font-style: normal;
  font-weight: 400;
  color: var(--warm-4);
}

/* ─── COLLECTION ─── */
.collection {
  padding: 0 5vw 10vw;
}

.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 4rem;
  padding-bottom: 1.5rem;
  border-bottom: 0.5px solid var(--warm-2);
}

.section-title {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink);
}

.section-count {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--warm-3);
}

/* Masonry-ish product grid */
.products
