<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Djiline — Modest Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--black:#0e0e0e;
--grey:#666;
--line:#ece7df;
--serif:'Cormorant Garamond',serif;
--sans:'Jost',sans-serif;
}

html,body{
font-family:var(--sans);
background:#fff;
color:var(--black);
overflow-x:hidden;
}

/* CURSOR (desktop only) */
.cursor{
width:18px;height:18px;
border:1px solid #000;
border-radius:50%;
position:fixed;
top:0;left:0;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
transition:.15s;
background:rgba(0,0,0,.05);
}

.cursor.hover{
width:40px;height:40px;
background:rgba(0,0,0,.12);
}

/* NAV */
nav{
position:fixed;
top:0;left:0;
width:100%;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 5vw;
background:#fff;
border-bottom:1px solid rgba(0,0,0,.06);
}

.logo img{height:42px;}

/* DESKTOP LINKS */
.nav-links{
display:flex;
gap:35px;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:#555;
font-size:11px;
letter-spacing:.2em;
text-transform:uppercase;
}

/* BUTTON */
.nav-btn{
background:#000;
color:#fff;
padding:12px 20px;
text-decoration:none;
font-size:10px;
letter-spacing:.2em;
text-transform:uppercase;
}

/* HAMBURGER */
.menu-toggle{
display:none;
font-size:26px;
background:none;
border:none;
cursor:pointer;
}

/* OVERLAY MENU (LUXE MOBILE) */
.mobile-menu{
position:fixed;
inset:0;
background:#0e0e0e;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
opacity:0;
pointer-events:none;
transition:.4s ease;
z-index:2000;
}

.mobile-menu a{
color:white;
text-decoration:none;
font-size:22px;
letter-spacing:.2em;
text-transform:uppercase;
}

.mobile-menu.active{
opacity:1;
pointer-events:auto;
}

/* HERO */
.hero{
height:100vh;
margin-top:80px;
position:relative;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-overlay{
position:absolute;inset:0;
background:linear-gradient(to right,rgba(0,0,0,.6),transparent);
}

.hero-content{
position:absolute;
bottom:80px;
left:6vw;
color:#fff;
max-width:600px;
}

.hero h1{
font-family:var(--serif);
font-size:clamp(60px,9vw,130px);
font-weight:300;
line-height:.9;
}

.hero p{line-height:2;font-size:14px;margin-top:20px;}

.hero-buttons{
display:flex;
gap:15px;
margin-top:25px;
}

.hero-btn{
padding:14px 22px;
text-decoration:none;
font-size:10px;
letter-spacing:.2em;
text-transform:uppercase;
}

.hero-btn.dark{background:#fff;color:#000;}
.hero-btn.light{border:1px solid #fff;color:#fff;}

/* PRODUCTS */
.section{padding:100px 5vw;}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card-image{position:relative;aspect-ratio:4/5;overflow:hidden;background:#eee;}

.card-image img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.price{margin:10px 0;font-weight:500;}

/* FOOTER */
footer{
padding:40px 5vw;
border-top:1px solid #eee;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
}

/* RESPONSIVE */
@media(max-width:1000px){
.products{grid-template-columns:1fr 1fr;}
}

@media(max-width:700px){

.menu-toggle{display:block;}

.nav-links{display:none;}
.nav-btn{display:none;}

.cursor{display:none;}

nav{
justify-content:space-between;
}

.products{grid-template-columns:1fr;}

.hero h1{font-size:55px;}
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- NAV -->
<nav>
<a href="index.html" class="logo">
<img src="images/logo.png.jpg">
</a>

<ul class="nav-links">
<li><a href="kimono.html">Kimono</a></li>
<li><a href="abaya.html">Abaya</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<a href="https://wa.me/33768260699" class="nav-btn">Commander</a>

<button class="menu-toggle">☰</button>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
<a href="kimono.html">Kimono</a>
<a href="abaya.html">Abaya</a>
<a href="contact.html">Contact</a>
<a href="https://wa.me/33768260699">Commander</a>
</div>

<!-- HERO -->
<section class="hero">
<img src="images/hero.jpg.jpeg">
<div class="hero-overlay"></div>

<div class="hero-content">
<h1>Élégance<br>Moderne</h1>
<p>Modest fashion premium pensée pour la femme contemporaine.</p>

<div class="hero-buttons">
<a href="kimono.html" class="hero-btn dark">Kimono</a>
<a href="abaya.html" class="hero-btn light">Abaya</a>
</div>
</div>
</section>

<!-- SIMPLE SECTION -->
<section class="section">
<div class="products">

<div class="card">
<div class="card-image">
<img src="images/hero.jpg.jpeg">
</div>
<div class="price">95€</div>
</div>

<div class="card">
<div class="card-image">
<img src="images/hero.jpg.jpeg">
</div>
<div class="price">110€</div>
</div>

<div class="card">
<div class="card-image">
<img src="images/hero.jpg.jpeg">
</div>
<div class="price">120€</div>
</div>

</div>
</section>

<!-- FOOTER -->
<footer>
<div>Djiline — Modest Fashion</div>
<div>Instagram @djiline.fr</div>
</footer>

<script>

/* CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',(e)=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* HOVER */
document.querySelectorAll('a,button,.card').forEach(el=>{
el.addEventListener('mouseenter',()=>cursor.classList.add('hover'));
el.addEventListener('mouseleave',()=>cursor.classList.remove('hover'));
});

/* MOBILE MENU */
const menuBtn=document.querySelector('.menu-toggle');
const menu=document.getElementById('mobileMenu');

menuBtn.addEventListener('click',()=>{
menu.classList.toggle('active');
});

</script>

</body>
</html>
