<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Djiline — Modest Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --ink:#0d0d0d;
  --paper:#f6f3ee;
  --serif:'Cormorant Garamond', serif;
  --sans:'Jost', sans-serif;
}

body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
}

/* NAV */

nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:999;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 5vw;

  background:rgba(246,243,238,.85);
  backdrop-filter:blur(12px);
}

.logo img{
  height:42px;
}

/* HERO */

.hero{
  height:100vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,.65), rgba(0,0,0,.15));
}

.hero-content{
  position:absolute;
  bottom:10%;
  left:5vw;
  color:white;
  max-width:600px;
}

.hero h1{
  font-family:var(--serif);
  font-size:clamp(50px,8vw,120px);
  font-weight:300;
  line-height:1;
}

/* COLLECTION */

.collection{
  padding:100px 5vw;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:30px;
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:6px;
}

/* CONTACT */

.contact{
  padding:100px 5vw;
  text-align:center;
}

.contact a{
  display:inline-block;
  margin-top:20px;
  background:#111;
  color:white;
  padding:14px 28px;
  border-radius:999px;
  text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

  <div class="logo">
    <img src="images/logo.png.jpg" alt="logo">
  </div>

  <a class="nav-btn" href="https://wa.me/33768260699" target="_blank">
    WhatsApp
  </a>

</nav>

<!-- HERO -->
<section class="hero">

  <img src="images/hero.jpg.jpeg" alt="hero">

  <div class="hero-content">
    <h1>Djiline</h1>
    <p>Mode modeste contemporaine — élégance minimaliste.</p>
  </div>

</section>

<!-- COLLECTION -->
<section class="collection">

  <div class="products">

    <a class="card" href="https://wa.me/33768260699?text=Commande%20Parka%20Bleu">

      <img src="images/parkableu.jpg.jpeg" alt="Parka Bleu">

      <h3>Parka Bleu</h3>
      <p>Coupe oversize</p>

    </a>

  </div>

</section>

<!-- CONTACT -->
<section class="contact">

  <h2>Commander</h2>

  <a href="https://wa.me/33768260699" target="_blank">
    WhatsApp
  </a>

</section>

</body>
</html>
