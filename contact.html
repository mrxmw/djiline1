<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Djiline</title>

<style>

body{
  margin:0;
  padding:60px 20px;
  font-family:Arial;
  background:white;
  color:black;
}

.container{
  max-width:700px;
  margin:auto;
}

h1{
  font-size:55px;
  margin-bottom:20px;
}

p{
  color:#666;
  line-height:1.8;
  margin-bottom:40px;
}

form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,
textarea{
  padding:16px;
  border:1px solid #ddd;
  font-size:14px;
  width:100%;
}

button{
  background:black;
  color:white;
  border:none;
  padding:16px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.2em;
}

.back{
  display:inline-block;
  margin-bottom:40px;
  color:black;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">
← Retour accueil
</a>

<h1>
Contact
</h1>

<p>
Une question, une collaboration ou une demande ?
Contactez-nous directement par mail.
</p>

<form action="mailto:contact@djiline.fr" method="post" enctype="text/plain">

<input type="text" placeholder="Votre nom" required>

<input type="email" placeholder="Votre email" required>

<textarea rows="6" placeholder="Votre message"></textarea>

<button type="submit">
Envoyer
</button>

</form>

</div>

</body>
</html>
